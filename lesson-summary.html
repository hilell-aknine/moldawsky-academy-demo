<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>סיכום שיעור · אקדמיית מולדבסקי</title>
  <link rel="stylesheet" href="css/portal.css">
  <style>
    /* ===== Toolbar (NOT captured in PDF) ===== */
    .ls-toolbar {
      display:flex; align-items:center; gap:12px; flex-wrap:wrap;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r); padding:14px 16px; box-shadow:var(--shadow-sm);
      margin-block-end:22px;
    }
    .ls-toolbar .grow { flex:1; min-width:160px; }
    .ls-select {
      width:100%; padding:11px 14px; border-radius:11px;
      background:var(--surface-2); border:1px solid var(--border-2);
      color:var(--text); font-size:14px; font-family:var(--font); font-weight:600;
    }
    .ls-toolbar .back { color:var(--text-dim); font-weight:700; font-family:var(--font-head); font-size:13.5px; display:inline-flex; align-items:center; gap:6px; min-height:44px; }
    .ls-toolbar .back:hover { color:var(--green); }

    /* ===== The printable product panel ===== */
    .ls-sheet-wrap { display:flex; justify-content:center; }
    #summarySheet {
      width:100%; max-width:880px;
      background:#FFFFFF; color:#16181D;
      border:1px solid #E6E8EE; border-radius:18px;
      box-shadow:var(--shadow); overflow:hidden;
      font-family:'Heebo', sans-serif;
    }

    /* --- Top app-bar of the panel --- */
    .panel-bar {
      display:flex; align-items:center; gap:11px;
      padding:15px 24px; border-block-end:1px solid #EEF0F4; background:#FBFBFD;
    }
    .panel-bar .logo {
      width:34px; height:34px; border-radius:10px; background:#3B5BDB;
      display:grid; place-items:center; color:#fff; font-weight:800; font-size:17px;
      font-family:'Assistant',sans-serif; box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);
    }
    .panel-bar .brand-name { font-family:'Assistant',sans-serif; font-weight:800; font-size:14.5px; color:#16181D; line-height:1.2; }
    .panel-bar .brand-sub { font-size:11.5px; color:#8A909C; margin-top:1px; }
    .panel-bar .doc-kind {
      margin-inline-start:auto; font-family:'Assistant',sans-serif; font-weight:700;
      font-size:11px; letter-spacing:.6px; color:#2F4BC4; text-transform:uppercase;
      background:#EEF1FE; border:1px solid #DDE3FB; padding:5px 12px; border-radius:8px;
      display:inline-flex; align-items:center; gap:6px;
    }
    .panel-bar .doc-kind svg.lucide { width:13px; height:13px; }

    /* --- Title block --- */
    .panel-title { padding:24px 28px 20px; border-block-end:1px solid #F1F2F6; }
    .panel-title .eyebrow {
      font-family:'Assistant',sans-serif; font-weight:700; font-size:11.5px; letter-spacing:.6px;
      color:#8A909C; text-transform:uppercase; margin-block-end:8px;
      display:inline-flex; align-items:center; gap:6px;
    }
    .panel-title .eyebrow svg.lucide { width:14px; height:14px; color:#3B5BDB; }
    .panel-title h1 { font-family:'Assistant',sans-serif; font-size:26px; line-height:1.2; color:#16181D; }

    /* --- Two-column product layout --- */
    .panel-grid {
      display:grid; grid-template-columns:1fr 248px; align-items:stretch;
    }
    .panel-main { padding:24px 28px 28px; border-inline-start:1px solid #F1F2F6; }
    .panel-aside { padding:24px 22px 28px; background:#FBFBFD; }

    /* --- Aside meta cells --- */
    .meta-cell { padding:13px 0; border-block-end:1px solid #ECEDF1; }
    .meta-cell:first-child { padding-top:0; }
    .meta-cell:last-child { border-block-end:none; padding-bottom:0; }
    .meta-cell .k {
      font-family:'Assistant',sans-serif; font-size:11px; font-weight:700; letter-spacing:.5px;
      color:#9AA0AD; text-transform:uppercase; margin-block-end:6px;
      display:flex; align-items:center; gap:6px;
    }
    .meta-cell .k svg.lucide { width:13px; height:13px; color:#9AA0AD; }
    .meta-cell .v { font-family:'Assistant',sans-serif; font-size:14.5px; font-weight:700; color:#16181D; display:flex; align-items:center; gap:8px; }
    .meta-cell .mod-ic {
      width:28px; height:28px; border-radius:8px; background:#EEF1FE; color:#2F4BC4;
      display:grid; place-items:center; flex-shrink:0;
    }
    .meta-cell .mod-ic svg.lucide { width:15px; height:15px; }

    /* --- Lesson position bar --- */
    .pos-num { font-family:'Assistant',sans-serif; font-size:20px; font-weight:800; color:#16181D; }
    .pos-num small { font-size:13px; font-weight:700; color:#9AA0AD; }
    .pos-track { height:6px; border-radius:999px; background:#ECEDF1; overflow:hidden; margin-block-start:9px; }
    .pos-track > i { display:block; height:100%; border-radius:999px; background:linear-gradient(135deg,#4666E5,#3B5BDB); }

    /* --- Watch-again link (product action, not advice) --- */
    .watch-btn {
      display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
      margin-block-start:20px; padding:11px 14px; min-height:44px; border-radius:11px;
      background:#1D1F26; color:#fff; font-family:'Assistant',sans-serif; font-weight:700; font-size:13.5px;
    }
    .watch-btn svg.lucide { width:16px; height:16px; }
    .watch-btn:hover { background:#000; }

    /* --- Main: overview --- */
    .panel-section { margin-block-end:26px; }
    .panel-section:last-child { margin-block-end:0; }
    .panel-section h2 {
      font-family:'Assistant',sans-serif; font-size:14px; font-weight:800; color:#16181D;
      display:flex; align-items:center; gap:8px; margin-block-end:13px; letter-spacing:-.2px;
    }
    .panel-section h2 .ic {
      width:26px; height:26px; border-radius:8px; background:#EEF1FE; color:#2F4BC4;
      display:grid; place-items:center; flex-shrink:0;
    }
    .panel-section h2 .ic svg.lucide { width:14px; height:14px; }
    .panel-section h2 .count {
      margin-inline-start:auto; font-size:11.5px; font-weight:700; color:#9AA0AD;
      background:#F4F5F8; border:1px solid #ECEDF1; padding:2px 9px; border-radius:999px;
    }

    .overview { font-size:14.5px; color:#3a3f4b; line-height:1.75; }

    /* --- "מה נלמד בשיעור" clean checklist --- */
    .check-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
    .check-list li {
      display:flex; gap:11px; align-items:flex-start; font-size:14px; line-height:1.6; color:#2b2f3a;
      background:#FBFBFD; border:1px solid #EEF0F4; border-radius:11px; padding:11px 13px;
    }
    .check-list li .tick {
      flex-shrink:0; width:22px; height:22px; border-radius:7px; margin-top:1px;
      background:#E7F5EF; color:#1F9D6B; display:grid; place-items:center;
    }
    .check-list li .tick svg.lucide { width:13px; height:13px; stroke-width:2.6; }

    /* --- "מושגי מפתח" card grid --- */
    .term-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
    .term-card {
      background:#FFFFFF; border:1px solid #ECEDF1; border-radius:12px; padding:13px 14px;
      box-shadow:0 1px 2px rgba(20,24,34,.03);
    }
    .term-card b {
      font-family:'Assistant',sans-serif; font-size:13.5px; font-weight:800; color:#16181D; display:block; margin-block-end:4px;
    }
    .term-card span { font-size:12.5px; color:#5B616E; line-height:1.5; }

    /* --- Footer --- */
    .panel-foot {
      border-block-start:1px solid #EEF0F4; padding:16px 28px; background:#FBFBFD;
      display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
    }
    .panel-foot .fl { font-family:'Assistant',sans-serif; font-weight:700; font-size:12.5px; color:#5B616E; display:flex; align-items:center; gap:8px; }
    .panel-foot .fl .m { width:24px; height:24px; border-radius:7px; background:#1D1F26; color:#fff; display:grid; place-items:center; font-size:12px; font-weight:800; font-family:'Assistant',sans-serif; }
    .panel-foot .fr { font-size:12px; color:#9AA0AD; }
    .panel-foot .fr b { color:#5B616E; }

    /* PDF capture: force a clean white sheet regardless of theme */
    #summarySheet, #summarySheet * { color-scheme: light; }
    .pdf-capturing #summarySheet { box-shadow:none; border-color:#e3e5ea; }

    /* ===== Responsive ===== */
    @media (max-width:780px){
      .panel-grid { grid-template-columns:1fr; }
      .panel-main { border-inline-start:none; border-block-start:1px solid #F1F2F6; order:2; }
      .panel-aside { order:1; }
      .meta-aside-inner { display:grid; grid-template-columns:1fr 1fr; gap:0 22px; }
      .meta-aside-inner .meta-cell { border-block-end:1px solid #ECEDF1; }
      .watch-btn { grid-column:1 / -1; }
    }
    @media (max-width:760px){
      body { overflow-x:hidden; }
      .ls-toolbar { flex-direction:column; align-items:stretch; gap:10px; padding:14px; }
      .ls-toolbar .grow { min-width:0; width:100%; }
      .ls-toolbar .btn { width:100%; }
      .ls-toolbar .back { justify-content:center; }
      .ls-sheet-wrap { padding-inline:0; }
      #summarySheet { width:100%; max-width:100%; border-radius:0; border-inline:none; }
      .panel-bar { padding:14px 16px; }
      .panel-bar .doc-kind { display:none; }
      .panel-title { padding:20px 16px 16px; }
      .panel-title h1 { font-size:21px; }
      .panel-main { padding:20px 16px; }
      .panel-aside { padding:18px 16px; }
      .panel-foot { padding:14px 16px; flex-direction:column; align-items:flex-start; gap:6px; }
      .term-grid { grid-template-columns:1fr; }
    }
    @media (max-width:480px){
      .panel-title h1 { font-size:19px; }
      .panel-section h2 { font-size:13.5px; }
      .overview { font-size:13.5px; }
      .check-list li { font-size:13px; }
      .meta-aside-inner { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div id="topbar"></div>
  <main class="app-main"><div class="app-content">

    <!-- Toolbar (not part of the PDF) -->
    <div class="ls-toolbar" id="lsToolbar">
      <div class="grow">
        <select class="ls-select" id="lessonSelect" aria-label="בחירת שיעור"></select>
      </div>
      <button class="btn btn--primary" id="btnPdf"><i data-lucide="download"></i> הורד PDF</button>
      <button class="btn btn--outline" id="btnPrint"><i data-lucide="printer"></i> הדפס</button>
      <a class="back" id="backLink" href="course-library.html"><i data-lucide="arrow-right"></i> חזרה לקורס</a>
    </div>

    <!-- The product panel -->
    <div class="ls-sheet-wrap">
      <article id="summarySheet"><!-- rendered by JS --></article>
    </div>

    <div class="credit">נבנה ע"י <b>הלל אקנין</b></div>
  </div></main>

  <div id="bottomnav"></div>

  <script src="data/curriculum.js"></script>
  <script src="js/portal-core.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    document.getElementById('topbar').innerHTML = renderTopbar('lesson-summary.html');
    document.getElementById('bottomnav').innerHTML = renderBottomNav('lesson-summary.html');

    const LESSONS = window.ALL_LESSONS || [];

    /* ---------- Per-lesson real content: takeaways[] ("מה נלמד") + terms[{t,d}] ("מושגי מפתח") ----------
       No advice / actions / tips. Real lesson content only. */
    const CONTENT = {
      l1: {
        takeaways:[
          'דניאל מולדבסקי בנה מותגי איקומרס אמיתיים (כמו תנאור) שגלגלו עשרות מיליוני שקלים.',
          'המטרה של הקורס היא תוצאה אחת ברורה: חנות מוכרת מאפס, לא רק תאוריה.',
          'המסע הוא צעד אחר צעד, גם למי שלא נגע בעולם המסחר האונליין מעולם.'
        ],
        terms:[
          {t:'איקומרס',d:'מסחר אלקטרוני · מכירת מוצרים דרך חנות אינטרנטית.'},
          {t:'מותג',d:'זהות שלמה (שם, עיצוב, חוויה) שלקוחות זוכרים וסומכים עליה.'}
        ]
      },
      l2: {
        takeaways:[
          'שופיפיי היא פלטפורמה שמאפשרת לבנות חנות מקצועית בלי לדעת לתכנת.',
          'היא plug & play: הכל מגיע מוכן, אתה רק מרכיב את החלקים.',
          'מותגי ענק בעולם בנויים עליה, אז אתה לא מתפשר על איכות.'
        ],
        terms:[
          {t:'שופיפיי (Shopify)',d:'מערכת לבניית חנויות אונליין בשליטה מלאה.'},
          {t:'Plug & Play',d:'מוכן לשימוש מיד, בלי הגדרות טכניות מורכבות.'}
        ]
      },
      l3: {
        takeaways:[
          'חנות עצמאית נותנת לך שליטה מלאה במחיר, בעיצוב ובחוויית הלקוח.',
          'במרקטפלייס (אמזון, איביי, אטסי) אתה דוכן בשוק של מישהו אחר, עם עמלות גבוהות.',
          'בחנות שלך אין סכנה שיחסמו אותך באופן שרירותי ויאבדו לך את כל העסק.'
        ],
        terms:[
          {t:'מרקטפלייס',d:'זירת מכירה משותפת (אמזון/איביי) עם תחרות ועמלות.'},
          {t:'מיתוג',d:'יכולת לעצב את החנות כך שתשקף רק אותך.'}
        ]
      },
      l4: {
        takeaways:[
          'חנות שמרוויחה כ-25,000₪ בחודש יכולה להישווה ל-1 עד 3 מיליון שקלים.',
          'אתה לא רק מרוויח חודש בחודשו, אתה בונה נכס שאפשר למכור בעתיד.',
          'חשיבה של "נכס" משנה את כל ההחלטות שלך לטווח ארוך.'
        ],
        terms:[
          {t:'נכס',d:'דבר שמייצר ערך וכסף לאורך זמן וניתן למכירה.'},
          {t:'מכפיל (Multiple)',d:'מספר שמכפיל את הרווח החודשי לשווי המכירה.'}
        ]
      },
      l5: {
        takeaways:[
          'שם גנרי וקצר בלי משמעות (כמו זרה או סוני) זוכר וגמיש יותר ממונח תיאורי.',
          'אפשר לייצר 20 רעיונות לשם תוך 2 דקות עם ChatGPT.',
          'תמיד בודקים שהדומיין (כתובת האתר) פנוי לפני שמתאהבים בשם.'
        ],
        terms:[
          {t:'דומיין',d:'כתובת האתר שלך (לדוגמה shopname.com).'},
          {t:'ChatGPT',d:'כלי AI שמייצר רעיונות וטקסט בשניות.'}
        ]
      },
      l6: {
        takeaways:[
          'פותחים כתובת Gmail ייעודית רק לעסק, כדי להפריד מהפרטי.',
          'נרשמים לשופיפיי בהצעת ה-1$ לחודש כדי להתחיל בזול.',
          'בוחרים תוכנית לפי המחזור: Basic להתחלה, Grow/Advanced כשגדלים.'
        ],
        terms:[
          {t:'תוכנית Basic',d:'מסלול ההתחלה של שופיפיי, מתאים למחזור נמוך.'},
          {t:'מחזור',d:'סך הכסף שעובר דרך החנות לפני הוצאות.'}
        ]
      },
      l7: {
        takeaways:[
          'דומיין משלך נראה מקצועי וממיר יותר מכתובת ברירת מחדל של שופיפיי.',
          'אפשר לקנות דומיין בזול (לדוגמה ב-GoDaddy).',
          'החיבור לשופיפיי הוא כמעט בלחיצת כפתור.'
        ],
        terms:[
          {t:'GoDaddy',d:'ספק פופולרי לרכישת דומיינים.'},
          {t:'המרה (Conversion)',d:'אחוז המבקרים שהופכים לקונים.'}
        ]
      },
      l8: {
        takeaways:[
          'אפליקציות מוסיפות יכולות לחנות בלי לכתוב שורת קוד.',
          'באנדלים (חבילות) מעלים את סך ההזמנה הממוצע, ה-AOV.',
          'ה-AOV הוא אחד הנתונים שמכריעים אם החנות רווחית.'
        ],
        terms:[
          {t:'AOV',d:'Average Order Value · סכום ההזמנה הממוצע ללקוח.'},
          {t:'באנדל',d:'חבילת מוצרים שנמכרת יחד במחיר מושך.'}
        ]
      },
      l9: {
        takeaways:[
          'AutoDS מושכת מוצרים מאלי-אקספרס לחנות שלך בקלות.',
          'היא ממלאת הזמנות אוטומטית, גם בנפח של אלף הזמנות ביום.',
          'זה מה שמאפשר לנהל דרופשיפינג בלי לגעת ידנית בכל הזמנה.'
        ],
        terms:[
          {t:'AutoDS',d:'אפליקציה לניהול דרופשיפינג ומילוי הזמנות.'},
          {t:'מילוי אוטומטי',d:'הזמנה אצל הספק קורית לבד אחרי כל מכירה.'}
        ]
      },
      l10: {
        takeaways:[
          'מתאימים את החנות לעברית ולכיוון מימין לשמאל (RTL).',
          'אפסל בעגלה מציע ללקוח עוד מוצר ברגע הקנייה.',
          'אפליקציית ביקורות עם AI מייצרת הוכחה חברתית שמוכרת.'
        ],
        terms:[
          {t:'RTL',d:'Right To Left · התאמת המראה לכיוון העברית.'},
          {t:'הוכחה חברתית',d:'עדויות וביקורות שמשכנעות לקוחות חדשים.'}
        ]
      },
      l11: {
        takeaways:[
          'מגדירים מוצר חדש עם מחיר מכירה מול עלות הספק.',
          'רואים מיד את המרג\'ין, כלומר כמה נשאר לך מכל מכירה.',
          'מנהלים מלאי ומחליטים אם להמשיך למכור גם בלי מלאי (continue selling).'
        ],
        terms:[
          {t:'מרג\'ין',d:'ההפרש בין מחיר המכירה לעלות · הרווח הגולמי.'},
          {t:'Continue selling',d:'אפשרות למכור גם כשאין מלאי רשום.'}
        ]
      },
      l12: {
        takeaways:[
          'דרופשיפינג הוא מודל שבו אתה מתווך בין הלקוח לספק בלי להחזיק מלאי.',
          'הלקוח מזמין ומשלם אצלך, ואתה מזמין מהספק ששולח ישירות.',
          'המודל חוקי ומוסרי לחלוטין: אתה מספק שירות, נוחות וחוויית קנייה.',
          'הלקוח לא יודע ולא אכפת לו מאיפה מגיע המוצר, בדיוק כמו בכל חנות.'
        ],
        terms:[
          {t:'דרופשיפינג',d:'מכירה ללא מלאי · הספק שולח ישירות ללקוח.'},
          {t:'ספק (Supplier)',d:'הגורם שמייצר ושולח את המוצר בפועל.'},
          {t:'תיווך',d:'אתה מחבר בין הצורך של הלקוח לפתרון של הספק.'}
        ]
      },
      l13: {
        takeaways:[
          'מוצר מנצח פותר כאב אמיתי או מעורר רגש חזק.',
          'טווח מחיר של 100 עד 300₪ אידיאלי לרכישה אימפולסיבית.',
          'מחפשים מוצרים ב-AutoDS ובאלי-אקספרס לפי הקריטריונים.'
        ],
        terms:[
          {t:'מוצר מנצח',d:'מוצר עם ביקוש, מרג\'ין ופוטנציאל ויראלי.'},
          {t:'רכישה אימפולסיבית',d:'קנייה מהירה מרגש, בלי התלבטות ארוכה.'}

    /* ---------- Generic fallback (real-summary derived, no advice) ---------- */
    function fallback(les) {
      const s = les.summary || '';
      const first = s.split(/[.·]/).map(x => x.trim()).filter(Boolean);
      const takeaways = (first.length ? first : [s]).slice(0,4);
      return {
        takeaways,
        terms:[
          {t:'איקומרס', d:'מכירת מוצרים דרך חנות אינטרנטית.'},
          {t:'מותג', d:'זהות שלמה שלקוחות זוכרים וסומכים עליה.'}
        ]
      };
    }

    /* ---------- Resolve current lesson ---------- */
    function resolveLesson() {
      const id = qs('lesson');
      let les = id ? LESSONS.find(l => l.id === id) : null;
      if (!les) les = (window.Progress && window.Progress.nextLesson()) || LESSONS[0];
      return les;
    }

    function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    /* ---------- Render the product panel ---------- */
    function renderSheet(les) {
      const c = CONTENT[les.id] || fallback(les);
      const total = window.LESSON_COUNT || LESSONS.length || 44;
      const num = parseInt(String(les.id).replace('l',''), 10) || 1;
      const pct = Math.round((num / total) * 100);

      const checks = (c.takeaways || []).map(x =>
        `<li><span class="tick"><i data-lucide="check"></i></span><span>${esc(x)}</span></li>`).join('');
      const terms = (c.terms || []).map(t =>
        `<div class="term-card"><b>${esc(t.t)}</b><span>${esc(t.d)}</span></div>`).join('');

      document.getElementById('summarySheet').innerHTML = `
        <div class="panel-bar">
          <span class="logo">M</span>
          <div>
            <div class="brand-name">אקדמיית מולדבסקי</div>
            <div class="brand-sub">הכשרת האיקומרס · דניאל מולדבסקי</div>
          </div>
          <span class="doc-kind"><i data-lucide="file-text"></i> סיכום שיעור</span>
        </div>

        <div class="panel-title">
          <div class="eyebrow"><i data-lucide="graduation-cap"></i> ${esc(les.moduleTitle || 'שיעור')}</div>
          <h1>${esc(les.title)}</h1>
        </div>

        <div class="panel-grid">
          <div class="panel-main">
            <div class="panel-section">
              <h2><span class="ic"><i data-lucide="align-left"></i></span> סקירה</h2>
              <p class="overview">${esc(les.summary || '')}</p>
            </div>

            <div class="panel-section">
              <h2><span class="ic"><i data-lucide="list-checks"></i></span> מה נלמד בשיעור <span class="count">${(c.takeaways||[]).length}</span></h2>
              <ul class="check-list">${checks}</ul>
            </div>

            <div class="panel-section">
              <h2><span class="ic"><i data-lucide="book-marked"></i></span> מושגי מפתח <span class="count">${(c.terms||[]).length}</span></h2>
              <div class="term-grid">${terms}</div>
            </div>
          </div>

          <aside class="panel-aside">
            <div class="meta-aside-inner">
              <div class="meta-cell">
                <div class="k"><i data-lucide="folder"></i> מודול</div>
                <div class="v"><span class="mod-ic">${les.moduleIcon || '<i data-lucide="folder"></i>'}</span> ${esc(les.moduleTitle || '')}</div>
              </div>
              <div class="meta-cell">
                <div class="k"><i data-lucide="clock"></i> משך השיעור</div>
                <div class="v">${esc(les.dur || 'לפי הקצב שלך')}</div>
              </div>
              <div class="meta-cell">
                <div class="k"><i data-lucide="layers"></i> מיקום בקורס</div>
                <div class="pos-num">${num}<small> / ${total}</small></div>
                <div class="pos-track"><i style="width:${pct}%"></i></div>
              </div>
            </div>
            <a class="watch-btn" href="course-library.html?lesson=${encodeURIComponent(les.id)}">
              <i data-lucide="play-circle"></i> צפה שוב בשיעור
            </a>
          </aside>
        </div>

        <div class="panel-foot">
          <div class="fl"><span class="m">M</span> אקדמיית מולדבסקי · הסיסטם מבוסס ה-AI להקמת מותג איקומרס מ-0</div>
          <div class="fr">נבנה ע"י <b>הלל אקנין</b></div>
        </div>`;
      window.refreshIcons();
    }

    /* ---------- Lesson <select> ---------- */
    function buildSelect(currentId) {
      const sel = document.getElementById('lessonSelect');
      let html = '', lastMod = '';
      LESSONS.forEach(l => {
        if (l.moduleId !== lastMod) {
          if (lastMod) html += '</optgroup>';
          html += `<optgroup label="${esc(l.moduleTitle)}">`;
          lastMod = l.moduleId;
        }
        const done = window.Progress.isDone(l.id) ? '✓ ' : '';
        html += `<option value="${l.id}" ${l.id===currentId?'selected':''}>${done}${esc(l.title)}</option>`;
      });
      html += '</optgroup>';
      sel.innerHTML = html;
      sel.onchange = () => {
        const url = new URL(location.href);
        url.searchParams.set('lesson', sel.value);
        location.href = url.toString();
      };
    }

    /* ---------- PDF + print ---------- */
    function downloadPDF(les) {
      window.refreshIcons();
      const el = document.getElementById('summarySheet');
      const safe = (les.title || 'שיעור').replace(/[\\/:*?"<>|]/g,'').trim();
      const fileName = `סיכום · ${safe}.pdf`;
      document.body.classList.add('pdf-capturing');
      const prevTheme = document.documentElement.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme','light');
      const btn = document.getElementById('btnPdf');
      const txt = btn.textContent; btn.textContent = 'מכין PDF…'; btn.disabled = true;

      html2pdf().set({
        margin: 8,
        filename: fileName,
        image: { type:'jpeg', quality:0.98 },
        html2canvas: { scale:2, useCORS:true, backgroundColor:'#FFFFFF' },
        jsPDF: { unit:'mm', format:'a4', orientation:'portrait' },
        pagebreak: { mode:['css','legacy'] }
      }).from(el).save().then(() => {
        toast('הסיכום ירד כקובץ PDF', '⬇');
      }).catch(() => {
        toast('משהו השתבש בהורדה', '⚠️');
      }).finally(() => {
        document.body.classList.remove('pdf-capturing');
        if (prevTheme) document.documentElement.setAttribute('data-theme', prevTheme);
        btn.textContent = txt; btn.disabled = false;
      });
    }

    /* ---------- Boot ---------- */
    const lesson = resolveLesson();
    renderSheet(lesson);
    buildSelect(lesson.id);
    document.getElementById('btnPdf').onclick = () => downloadPDF(lesson);
    document.getElementById('btnPrint').onclick = () => window.print();
  </script>

    #summarySheet { box-shadow:none !important; border:none !important; max-width:100% !important; }
    .watch-btn { display:none !important; }
    @page { size:A4; margin:10mm; }
  </style>
