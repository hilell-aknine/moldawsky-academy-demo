<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>סיכום שיעור · אקדמיית מולדבסקי</title>
  <link rel="stylesheet" href="css/portal.css">
  <style>
    /* ---- Toolbar (NOT captured in PDF) ---- */
    .ls-toolbar {
      display:flex; align-items:center; gap:12px; flex-wrap:wrap;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r); padding:16px 18px; box-shadow:var(--shadow-sm);
      margin-block-end:24px;
    }
    .ls-toolbar .grow { flex:1; min-width:160px; }
    .ls-select {
      width:100%; padding:11px 14px; border-radius:11px;
      background:var(--surface-2); border:1px solid var(--border-2);
      color:var(--text); font-size:14px; font-family:var(--font); font-weight:600;
    }
    .ls-toolbar .back { color:var(--text-dim); font-weight:700; font-family:var(--font-head); font-size:13.5px; }
    .ls-toolbar .back:hover { color:var(--green); }

    /* ---- The printable sheet ---- */
    .ls-sheet-wrap { display:flex; justify-content:center; }
    #summarySheet {
      width:100%; max-width:794px;            /* ~A4 width at 96dpi */
      background:#FFFFFF; color:#16181D;
      border:1px solid var(--border); border-radius:var(--r-lg);
      box-shadow:var(--shadow); overflow:hidden;
      font-family:'Heebo', sans-serif;
    }
    /* Brand header band */
    .sheet-head {
      background:#1D1F26; color:#fff;
      padding:30px 38px; position:relative;
    }
    .sheet-head .row { display:flex; align-items:center; gap:13px; }
    .sheet-head .logo {
      width:46px; height:46px; border-radius:13px; background:#3B5BDB;
      display:grid; place-items:center; color:#fff; font-weight:800; font-size:24px;
      font-family:'Assistant',sans-serif; box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
    }
    .sheet-head .brand-name { font-family:'Assistant',sans-serif; font-weight:800; font-size:18px; letter-spacing:-.3px; }
    .sheet-head .brand-sub { font-size:12.5px; color:#AEB7CD; margin-top:2px; }
    .sheet-head .doc-kind {
      margin-inline-start:auto; font-family:'Assistant',sans-serif; font-weight:800;
      font-size:13px; letter-spacing:1px; color:#6E8BFF;
      border:1px solid rgba(110,139,255,.4); padding:6px 14px; border-radius:999px;
    }
    .sheet-head h1 { color:#fff; font-size:27px; line-height:1.18; margin-top:22px; font-family:'Assistant',sans-serif; }
    .sheet-head .meta { display:flex; gap:9px; flex-wrap:wrap; margin-top:14px; }
    .sheet-head .chip {
      font-size:12px; font-weight:700; font-family:'Assistant',sans-serif;
      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.13);
      color:#ECEEF3; padding:5px 13px; border-radius:999px;
    }
    .sheet-head .chip.accent { background:rgba(59,91,219,.25); border-color:rgba(110,139,255,.45); color:#cdd6ff; }

    .sheet-body { padding:34px 38px 30px; }
    .sheet-intro { font-size:14.5px; color:#3a3f4b; line-height:1.7; margin-block-end:26px; }

    .ls-block { margin-block-end:26px; }
    .ls-block h2 {
      font-family:'Assistant',sans-serif; font-size:16.5px; font-weight:800; color:#16181D;
      display:flex; align-items:center; gap:9px; margin-block-end:13px;
      padding-block-end:9px; border-block-end:2px solid #EEF1F5;
    }
    .ls-block h2 .ic {
      width:27px; height:27px; border-radius:8px; background:#EEF1FE; color:#2F4BC4;
      display:grid; place-items:center; font-size:14px; flex-shrink:0;
    }
    .ls-list { list-style:none; display:flex; flex-direction:column; gap:11px; }
    .ls-list li { display:flex; gap:11px; align-items:flex-start; font-size:14px; line-height:1.6; color:#2b2f3a; }
    .ls-list li .bullet {
      flex-shrink:0; width:21px; height:21px; border-radius:6px; margin-top:1px;
      background:#E7F5EF; color:#1F9D6B; display:grid; place-items:center; font-size:11px; font-weight:800;
    }
    .ls-list.action li .bullet { background:#EEF1FE; color:#2F4BC4; }

    .ls-terms { display:flex; flex-wrap:wrap; gap:9px; }
    .ls-term {
      background:#F7F8FA; border:1px solid #ECEDF1; border-radius:10px; padding:9px 13px; max-width:100%;
    }
    .ls-term b { font-family:'Assistant',sans-serif; font-size:13.5px; color:#16181D; display:block; }
    .ls-term span { font-size:12px; color:#5B616E; line-height:1.4; }

    .ls-tip {
      background:#F6EFE2; border:1px solid #ecdfc4; border-inline-start:4px solid #B08947;
      border-radius:12px; padding:16px 18px; display:flex; gap:13px; align-items:flex-start;
    }
    .ls-tip .ava {
      width:40px; height:40px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,#C99B4B,#B08947); color:#fff;
      display:grid; place-items:center; font-family:'Assistant',sans-serif; font-weight:800; font-size:16px;
    }
    .ls-tip .t-head { font-family:'Assistant',sans-serif; font-weight:800; font-size:14px; color:#6e5320; margin-block-end:3px; }
    .ls-tip .t-body { font-size:13.5px; line-height:1.6; color:#5c4a22; }

    .sheet-foot {
      border-block-start:1px solid #EEF1F5; margin-top:6px; padding:18px 38px 24px;
      display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
    }
    .sheet-foot .fl { font-family:'Assistant',sans-serif; font-weight:800; font-size:13px; color:#16181D; display:flex; align-items:center; gap:8px; }
    .sheet-foot .fl .m { width:24px; height:24px; border-radius:7px; background:#1D1F26; color:#fff; display:grid; place-items:center; font-size:13px; font-weight:800; }
    .sheet-foot .fr { font-size:12px; color:#9AA0AD; }
    .sheet-foot .fr b { color:#5B616E; }

    /* PDF capture: force a clean white sheet regardless of theme */
    #summarySheet, #summarySheet * { color-scheme: light; }
    .pdf-capturing #summarySheet { box-shadow:none; border-color:#e3e5ea; }

    @media (max-width:560px){
      .sheet-head, .sheet-body, .sheet-foot { padding-inline:20px; }
      .sheet-head h1 { font-size:22px; }
    }

    /* ---- Mobile: 760px and below ---- */
    @media (max-width:760px){
      /* Prevent any horizontal overflow at the body level */
      body { overflow-x:hidden; }

      /* Toolbar: wrap controls, each takes full width */
      .ls-toolbar { flex-direction:column; align-items:stretch; gap:10px; padding:14px 14px; }
      .ls-toolbar .grow { min-width:0; width:100%; }
      .ls-select { width:100%; }
      .ls-toolbar .btn { width:100%; text-align:center; }
      .ls-toolbar .back { text-align:center; }

      /* Sheet: fill the viewport, no side overflow */
      .ls-sheet-wrap { padding-inline:0; }
      #summarySheet { width:100%; max-width:100%; border-radius:0; border-inline:none; }

      /* Header band */
      .sheet-head { padding:20px 16px; }
      .sheet-head .doc-kind { display:none; } /* too wide on small screens */
      .sheet-head h1 { font-size:20px; margin-top:14px; }

      /* Body and footer */
      .sheet-body { padding:22px 16px 18px; }
      .sheet-foot { padding:14px 16px 18px; flex-direction:column; align-items:flex-start; gap:6px; }

      /* Terms: single column */
      .ls-terms { flex-direction:column; }
      .ls-term { width:100%; box-sizing:border-box; }

      /* Tip: stack avatar above text */
      .ls-tip { flex-direction:column; gap:10px; padding:14px 14px; }
    }

    /* ---- Very small phones: 480px and below ---- */
    @media (max-width:480px){
      .sheet-head .row { flex-wrap:wrap; gap:10px; }
      .sheet-head h1 { font-size:18px; }
      .ls-block h2 { font-size:15px; }
      .sheet-intro { font-size:13.5px; }
      .ls-list li { font-size:13px; }
      .ls-term b { font-size:13px; }
      .ls-term span { font-size:11.5px; }
    }
  </style>
</head>

        tip:'אם ההוק לא עוצר את האגודל בשלוש שניות, שאר המודעה לא קיימת. תשקיע את רוב המאמץ בפתיחה.'
      },
      l30: {
        takeaways:[
          'מתחילים קמפיין ממומן עם תקציב קטן, למשל 100₪ ביום.',
          'המטרה היא יחס רווחי, למשל 100₪ הוצאה מול 500₪ מכירות.',
          'משם מעלים תקציב בהדרגה תוך שמירה על היחס.'
        ],
        actions:[
          'הקם קמפיין ראשון בתקציב יומי קטן.',
          'מדוד את היחס בין הוצאה למכירות לפני שמעלים.'
        ],
        terms:[
          {t:'ROAS',d:'היחס בין הכנסה מפרסום להוצאה עליו.'},
          {t:'קידום ממומן',d:'תשלום לפלטפורמות כדי להגיע ללקוחות.'}
        ],
        tip:'אל תעלה תקציב כי "בא לך". תעלה רק כשהיחס יציב ורווחי. סבלנות בפרסום היא כסף.'
      },
      l31: {
        takeaways:[
          'מבינים את ההבדל בין עוסק פטור לעוסק מורשה ואת נושא החשבוניות.',
          'AI הוא כלי עזר בכל שלב, מקופי ועד שירות.',
          'מי שרוצה ליווי צמוד יכול להמשיך לתוכנית DMA.'
        ],
        actions:[
          'בדוק איזה סוג עוסק מתאים לך לפי המחזור.',
          'שקול אם ליווי DMA מתאים לשלב שאתה נמצא בו.'
        ],
        terms:[
          {t:'עוסק פטור',d:'מעמד מס למחזור נמוך, ללא גביית מע"מ.'},
          {t:'DMA',d:'תוכנית הליווי הצמוד של דניאל מולדבסקי.'}
        ],
        tip:'אל תיבהל מהמיסוי. סדר את זה מההתחלה בקטן, ותהיה חופשי להתמקד במה שחשוב: למכור.'
      }
    };

    /* ---------- Generic fallback for any lesson without explicit content ---------- */
    function fallback(les) {
      const s = les.summary || '';
      const first = s.split(/[.·]/).map(x => x.trim()).filter(Boolean);
      const takeaways = (first.length ? first : [s]).slice(0,4);
      while (takeaways.length < 3) takeaways.push('צפה בשיעור עד הסוף ויישם את הנקודה המרכזית בחנות שלך.');
      return {
        takeaways,
        actions:[
          'צפה בשיעור עד הסוף ובצע בעצמך כל שלב במקביל.',
          'יישם את מה שלמדת מיד בחנות שלך, לא מחר.'
        ],
        terms:[
          {t:'איקומרס', d:'מכירת מוצרים דרך חנות אינטרנטית.'},
          {t:'יישום', d:'הפיכת ידע לפעולה בחנות בפועל.'}
        ],
        tip:'ידע בלי יישום שווה אפס. סגור את הסיכום ולך לבצע צעד אחד בחנות עכשיו.'
      };
    }

    /* ---------- Resolve current lesson ---------- */
    function resolveLesson() {
      const id = qs('lesson');
      let les = id ? LESSONS.find(l => l.id === id) : null;
      if (!les) les = (window.Progress && window.Progress.nextLesson()) || LESSONS[0];
      return les;
    }

    function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    /* ---------- Render the branded sheet ---------- */
    function renderSheet(les) {
      const c = CONTENT[les.id] || fallback(les);
      const li = (arr, cls) => `<ul class="ls-list ${cls||''}">` +
        arr.map(x => `<li><span class="bullet"><i data-lucide="${cls==='action'?'chevron-left':'check'}"></i></span><span>${esc(x)}</span></li>`).join('') + `</ul>`;
      const terms = (c.terms||[]).map(t =>
        `<div class="ls-term"><b>${esc(t.t)}</b><span>${esc(t.d)}</span></div>`).join('');

      document.getElementById('summarySheet').innerHTML = `
        <div class="sheet-head">
          <div class="row">
            <span class="logo">M</span>
            <div>
              <div class="brand-name">אקדמיית מולדבסקי</div>
              <div class="brand-sub">הכשרת האיקומרס · דניאל מולדבסקי</div>
            </div>
            <span class="doc-kind">סיכום שיעור</span>
          </div>
          <h1>${esc(les.title)}</h1>
          <div class="meta">
            <span class="chip accent">${esc(les.moduleIcon||'')} ${esc(les.moduleTitle||'')}</span>
            <span class="chip"><i data-lucide="clock"></i> ${esc(les.dur||'')}</span>
            <span class="chip">שיעור ${esc(les.id.replace('l',''))} מתוך ${window.LESSON_COUNT}</span>
          </div>
        </div>

        <div class="sheet-body">
          <p class="sheet-intro">${esc(les.summary||'')}</p>

          <div class="ls-block">
            <h2><span class="ic"><i data-lucide="book-open"></i></span> מה למדנו</h2>
            ${li(c.takeaways)}
          </div>

          <div class="ls-block">
            <h2><span class="ic"><i data-lucide="target"></i></span> נקודות מפתח לפעולה</h2>
            ${li(c.actions,'action')}
          </div>

          <div class="ls-block">
            <h2><span class="ic"><i data-lucide="tag"></i></span> מושגים</h2>
            <div class="ls-terms">${terms}</div>
          </div>

          <div class="ls-block">
            <h2><span class="ic"><i data-lucide="lightbulb"></i></span> טיפ של דניאל</h2>
            <div class="ls-tip">
              <span class="ava">ד</span>
              <div>
                <div class="t-head">דניאל מולדבסקי</div>
                <div class="t-body">${esc(c.tip)}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="sheet-foot">
          <div class="fl"><span class="m">M</span> אקדמיית מולדבסקי · הסיסטם מבוסס ה-AI להקמת מותג איקומרס מ-0</div>
          <div class="fr">נבנה ע"י <b>הלל אקנין</b></div>
        </div>`;
      window.refreshIcons();
    }

    /* ---------- Lesson <select> ---------- */
    function buildSelect(currentId) {
      const sel = document.getElementById('lessonSelect');
      let html = '', lastMod = '';
      LESSONS.forEach(l => {
        if (l.moduleId !== lastMod) {
          if (lastMod) html += '</optgroup>';
          html += `<optgroup label="${esc(l.moduleIcon)} ${esc(l.moduleTitle)}">`;
          lastMod = l.moduleId;
        }
        const done = window.Progress.isDone(l.id) ? '✓ ' : '';
        html += `<option value="${l.id}" ${l.id===currentId?'selected':''}>${done}${esc(l.title)}</option>`;
      });
      html += '</optgroup>';
      sel.innerHTML = html;
      sel.onchange = () => {
        const url = new URL(location.href);
        url.searchParams.set('lesson', sel.value);
        location.href = url.toString();
      };
    }

    /* ---------- PDF + print ---------- */
    function downloadPDF(les) {
      window.refreshIcons(); // ensure Lucide SVGs are rendered before capture
      const el = document.getElementById('summarySheet');
      const safe = (les.title || 'שיעור').replace(/[\\/:*?"<>|]/g,'').trim();
      const fileName = `סיכום · ${safe}.pdf`;
      document.body.classList.add('pdf-capturing');
      const prevTheme = document.documentElement.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme','light'); // clean white capture
      const btn = document.getElementById('btnPdf');
      const txt = btn.textContent; btn.textContent = 'מכין PDF…'; btn.disabled = true;

      html2pdf().set({
        margin: 8,
        filename: fileName,
        image: { type:'jpeg', quality:0.98 },
        html2canvas: { scale:2, useCORS:true, backgroundColor:'#FFFFFF' },
        jsPDF: { unit:'mm', format:'a4', orientation:'portrait' },
        pagebreak: { mode:['css','legacy'] }
      }).from(el).save().then(() => {
        toast('הסיכום ירד כקובץ PDF', '⬇');
      }).catch(() => {
        toast('משהו השתבש בהורדה', '⚠️');
      }).finally(() => {
        document.body.classList.remove('pdf-capturing');
        if (prevTheme) document.documentElement.setAttribute('data-theme', prevTheme);
        btn.textContent = txt; btn.disabled = false;
      });
    }

    /* ---------- Boot ---------- */
    const lesson = resolveLesson();
    renderSheet(lesson);
    buildSelect(lesson.id);
    document.getElementById('btnPdf').onclick = () => downloadPDF(lesson);
    document.getElementById('btnPrint').onclick = () => window.print();
  </script>

  <style media="print">
    /* Print: hide all app chrome, show only the sheet on a clean white page */
    .portal-header, .bottom-nav, #lsToolbar, .credit, .portal-fab, .portal-toast { display:none !important; }
    body, .app-main, .app-content { background:#fff !important; padding:0 !important; margin:0 !important; }
    #summarySheet { box-shadow:none !important; border:none !important; max-width:100% !important; }
    @page { size:A4; margin:10mm; }
  </style>
</body>
</html>
