<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אתגר הידע · אקדמיית מולדבסקי
  <link rel="stylesheet" href="css/portal.css">
  <style>
    /* ---- Game home ---- */
    .game-hero {
      background: linear-gradient(135deg, var(--surface-2) 0%, var(--surface) 100%);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 28px 24px 22px;
      text-align: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .game-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 100%, rgba(247,198,0,.10), transparent);
    }
    .game-hero h1 { font-size: 28px; position: relative; z-index: 1; }
    .game-hero .xp-bar { margin-top: 16px; position: relative; z-index: 1; }
    .xp-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
    .hero-stats { display: flex; gap: 18px; justify-content: center; margin-top: 18px; position: relative; z-index: 1; }
    .hero-stat { text-align: center; }
    .hero-stat .v { font-size: 26px; font-weight: 900; color: var(--green); line-height: 1; }
    .hero-stat .k { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    /* ---- Stage grid ---- */
    .stages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
    .stage-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: transform .2s var(--ease), border-color .2s, box-shadow .2s;
      position: relative;
    }
    .stage-card:hover {
      transform: translateY(-4px);
      border-color: var(--green-line);
      box-shadow: var(--glow);
    }
    .stage-card .stage-icon { margin-bottom: 8px; }
    .stage-card .stage-icon svg { width: 30px; height: 30px; }
    .stage-card .stage-num { font-size: 11px; font-weight: 700; color: var(--text-mute); margin-bottom: 4px; }
    .stage-card .stage-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
    .stage-card .stage-prog { margin-top: 12px; }
    .stage-card .stage-prog .progress-bar { height: 5px; }
    .stage-card .stage-score { position: absolute; top: 10px; left: 10px; font-size: 13px; font-weight: 800; color: var(--gold); }

    /* ---- Quiz overlay ---- */
    #quiz-overlay {
      position: fixed;
      inset: 0;
      z-index: 250;
      background: var(--bg);
      overflow-y: auto;
      display: none;
      flex-direction: column;
    }
    #quiz-overlay.open { display: flex; }

    .quiz-topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .quiz-topbar .close-btn {
      width: 38px; height: 38px; border-radius: 50%; background: var(--surface-2);
      border: 1px solid var(--border); font-size: 18px; display: grid; place-items: center;
      flex-shrink: 0;
    }
    .quiz-topbar .quiz-title { font-weight: 800; font-size: 15px; flex: 1; }
    .quiz-topbar .q-counter { font-size: 13px; color: var(--text-dim); white-space: nowrap; }

    .quiz-progress-wrap { padding: 0 20px 14px; background: var(--surface); }
    .quiz-progress-wrap .progress-bar { height: 7px; }

    .quiz-body { flex: 1; padding: 24px 20px 40px; max-width: 560px; margin: 0 auto; width: 100%; }

    .question-card { animation: pop .35s var(--ease) both; }
    .question-text {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 24px;
    }
    .options-list { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      width: 100%;
      padding: 16px 20px;
      border-radius: var(--r);
      border: 2px solid var(--border);
      background: var(--surface);
      text-align: right;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .12s;
      line-height: 1.4;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--green-line);
      background: var(--green-soft);
    }
    .option-btn.correct {
      border-color: var(--green);
      background: rgba(247,198,0,.18);
      color: var(--green);
    }
    .option-btn.wrong {
      border-color: var(--red);
      background: rgba(255,92,108,.12);
      color: var(--red);
    }
    .option-btn:disabled { cursor: default; }

    /* ---- Feedback panel ---- */
    .feedback-panel {
      margin-top: 20px;
      padding: 18px 20px;
      border-radius: var(--r);
      display: none;
      animation: pop .3s var(--ease) both;
    }
    .feedback-panel.show { display: block; }
    .feedback-panel.correct-fb { background: rgba(247,198,0,.12); border: 1.5px solid var(--green-line); }
    .feedback-panel.wrong-fb   { background: rgba(255,92,108,.10); border: 1.5px solid rgba(255,92,108,.4); }
    .feedback-icon { margin-bottom: 4px; }
    .feedback-icon svg { width: 26px; height: 26px; }
    .feedback-headline { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
    .feedback-explain { font-size: 14px; color: var(--text-dim); line-height: 1.5; }
    .feedback-xp { margin-top: 10px; font-size: 13px; font-weight: 700; color: var(--gold); }

    .next-btn-wrap { margin-top: 22px; }

    /* ---- Celebration screen ---- */
    #celebration {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      padding: 40px 24px;
      text-align: center;
      animation: pop .4s var(--ease) both;
    }
    #celebration.show { display: flex; }
    .cele-emoji { margin-bottom: 16px; animation: floaty 2s ease-in-out infinite; }
    .cele-emoji svg { width: 72px; height: 72px; }
    .cele-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
    .cele-subtitle { color: var(--text-dim); font-size: 16px; margin-bottom: 8px; }
    .cele-score { font-size: 48px; font-weight: 900; color: var(--green); margin: 20px 0 8px; }
    .cele-score-label { font-size: 15px; color: var(--text-dim); margin-bottom: 24px; }
    .cele-xp { font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 28px; }
    .stars { display: flex; gap: 6px; justify-content: center; margin-bottom: 8px; color: var(--gold); }
    .stars svg { width: 36px; height: 36px; }

    .section-title { font-size: 18px; font-weight: 800; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div id="topbar"></div>
  <main class="app-main">
    <div class="app-content">

      <!-- Game home -->
      <div id="game-home">
        <div class="game-hero pop">
          <div style="margin-bottom:6px;"><i data-lucide="gamepad-2" style="width:38px;height:38px;"></i></div>
          <h1>אתגר הידע של אקדמיית מולדבסקי</h1>
          <p class="muted" style="margin-top:6px;font-size:15px;">ענה נכון, צבור XP, ותפעיל את מה שלמדת · כבר בחנות האמיתית שלך.</p>
          <div class="hero-stats" id="hero-stats-row">
            <div class="hero-stat"><div class="v" id="stat-xp">0</div><div class="k">XP</div></div>
            <div class="hero-stat"><div class="v" id="stat-streak">3</div><div class="k"><i data-lucide="flame" style="width:13px;height:13px;vertical-align:-1px;"></i> רצף</div></div>
            <div class="hero-stat"><div class="v" id="stat-done">0</div><div class="k">שלבים מושלמים</div></div>
          </div>
          <div class="xp-bar" style="margin-top:20px;">
            <div class="xp-label"><span>התקדמות לרמה הבאה</span><span id="xp-pct-label">0 / 200 XP</span></div>
            <div class="progress-bar"><i id="xp-bar-fill" style="width:0%"></i></div>
          </div>
        </div>

        <div class="section-title">בחר נושא ותוכיח שידעת</div>
        <div class="stages-grid" id="stages-grid"></div>

        <div class="credit">נבנה ע"י <b>הלל אקנין</b></div>
      </div>

      <!-- Quiz overlay (full-screen) -->
      <div id="quiz-overlay">
        <div class="quiz-topbar">
          <button class="close-btn" onclick="closeQuiz()"><i data-lucide="x"></i></button>
          <div class="quiz-title" id="quiz-stage-title">שלב</div>
          <div class="q-counter" id="q-counter">1 / 5</div>
        </div>
        <div class="quiz-progress-wrap">
          <div class="progress-bar"><i id="quiz-progress-bar" style="width:0%"></i></div>
        </div>

        <div class="quiz-body">
          <!-- Active question -->
          <div id="question-area"></div>

          <!-- Celebration screen (end of stage) -->
          <div id="celebration">
            <div class="cele-emoji" id="cele-emoji"><i data-lucide="trophy"></i></div>
            <div class="stars" id="cele-stars"></div>
            <div class="cele-title" id="cele-title">כל הכבוד!</div>
            <div class="cele-subtitle" id="cele-subtitle">סיימת את השלב</div>
            <div class="cele-score" id="cele-score">5/5</div>
            <div class="cele-score-label">תשובות נכונות</div>
            <div class="cele-xp" id="cele-xp">+50 XP</div>
            <button class="btn btn--primary btn--lg" onclick="closeQuiz()">לשלב הבא ←</button>
          </div>
        </div>
      </div>

    </div>
  </main>
  <div id="bottomnav"></div>

  <script src="data/curriculum.js"></script>
  <script src="js/portal-core.js"></script>
  <script>
    document.getElementById('topbar').innerHTML = renderTopbar('game.html');
    document.getElementById('bottomnav').innerHTML = renderBottomNav('game.html');

    /* ============================================================
       QUESTION BANK
       ~15-20 real questions across module stages.
       Each question: { q, options:[...], correct (0-based index), explain }
    ============================================================ */
    const QUESTION_BANK = {
      m1: [
        {
          q: 'מה היתרון הגדול ביותר של חנות שופיפיי משלך לעומת מכירה בדוכן אמזון?',
          options: ['אמזון גובה עמלות גבוהות יותר', 'בחנות שלך יש שליטה מלאה, מיתוג, ואין סכנת חסימה בלי אזהרה', 'שופיפיי חינמי לחלוטין', 'אמזון לא מאפשרת למוכרים ישראלים להצטרף'],
          correct: 1,
          explain: 'כשאתה מוכר בדוכן של מישהו אחר (אמזון, איביי, אטסי) אתה חי לפי חוקיהם. חשבון שלך יכול להיחסם בין לילה בלי סיבה. בחנות שלך, אתה הבוס המוחלט.'
        },
        {
          q: 'חנות שמכניסה 25,000₪ בחודש שווה כנכס כמה לפי דניאל?',
          options: ['100,000₪', '500,000₪', 'בין מיליון ל-3 מיליון ₪', 'אין לה ערך כי ההכנסה לא מובטחת'],
          correct: 2,
          explain: 'חנות אינטרנטית רווחית נמכרת לפי מכפיל של 3-5 שנים על ההכנסה השנתית. 25K בחודש = 300K בשנה. כפול 3 עד 5 ואתה מגיע למיליון ואפילו שלושה. זה נכס, לא משכורת.'
        },
        {
          q: 'על איזו פלטפורמה בנויים גם מותגי ענק וגם חנויות של יחידים שמתחילים מהבית?',
          options: ['WooCommerce', 'Shopify', 'Wix', 'WordPress'],
          correct: 1,
          explain: 'שופיפיי היא ה-plug and play הגדולה בעולם לאיקומרס. בלי לדעת לתכנת אפשר לבנות חנות מקצועית תוך שעות ולהתחיל למכור מהיום.'
        },
        {
          q: 'איזה מוצר מומלץ לבחור כנקודת פתיחה לפי שיטת דניאל מולדבסקי?',
          options: ['מוצר יקר מאוד (מעל 1,000₪) כדי להרוויח מכל מכירה', 'מוצר שפותר כאב אמיתי, במחיר 100-300₪ לרכישה קלה', 'המוצר הכי פופולרי ב-TikTok השבוע', 'מוצר שכבר יש לך ממנו מלאי בבית'],
          correct: 1,
          explain: '100-300₪ הוא אזור הקנייה האימפולסיבית: מספיק יקר כדי לייצר רווח ממשי, מספיק זול כדי שהלקוח לא יהסס. מוצר שפותר כאב מוכר את עצמו.'
        },
        {
          q: 'מה עומד מאחורי ראשי התיבות AIDA בכתיבה שיווקית?',
          options: ['Attention, Interest, Desire, Action', 'Ad, Image, Data, Analytics', 'Audience, Insight, Design, Awareness', 'Algorithm, Index, Demographic, Automation'],
          correct: 0,
          explain: 'AIDA = תשומת-לב, עניין, חשק, פעולה. כל תיאור מוצר ותסריט מודעה שמוכר עובר בדיוק את ארבעת השלבים האלה בסדר הזה.'
        },
      ],
      m2: [
        {
          q: 'מדוע דניאל מעדיף שם מותג קצר וגנרי (כמו "זרה" או "סוני") על פני שם תיאורי?',
          options: ['כי שמות תיאוריים אסורים לרישום בישראל', 'כי שם חלק וריק קל לזכור ומאפשר גמישות מיצוב עתידית', 'כי גוגל מדרג שמות גנריים גבוה יותר בתוצאות', 'כי שמות תיאוריים יקרים יותר לרישום כסימן מסחרי'],
          correct: 1,
          explain: 'זרה, סוני, נייקי, אפל. שמות ריקים ממשמעות שאתה ממלא בתוכן עצמך. הם גמישים, קלים לזכור, ולא נועלים אותך לקטגוריה אחת לנצח.'
        },
        {
          q: 'איזה כלי דניאל ממליץ לשימוש בסיעור מוחות לשמות מותג?',
          options: ['Google Translate', 'ChatGPT', 'Canva', 'Fiverr'],
          correct: 1,
          explain: 'ChatGPT יכול להציף 20 רעיונות שמות בשניות ספורות. אחרי כן, כנסו ל-Namecheap או GoDaddy ובדקו שהדומיין פנוי. חמש דקות ויש לכם שם מותג.'
        },
        {
          q: 'כמה עולה החודש הראשון בשופיפיי בתקופת הניסיון שהם מציעים?',
          options: ['חינם לגמרי', '$1 לחודש', '$29 לחודש', '$99 לחודש'],
          correct: 1,
          explain: 'שופיפיי מציעה כניסה של $1 לחודש הראשון. זמן מספיק לבנות את החנות, לעצב, לייבא מוצרים, ולבדוק שהכל עובד, לפני שמתחייבים לתשלום מלא.'
        },
      ],
      m3: [
        {
          q: 'מה המשמעות של המדד AOV בחנות האינטרנטית שלך?',
          options: ['מספר הביקורות הממוצע של מוצר', 'ערך ההזמנה הממוצע (Average Order Value)', 'מספר המבקרים הייחודיים ביום', 'שיעור הנטישה של עגלת הקניות'],
          correct: 1,
          explain: 'AOV = Average Order Value. זה הסכום הממוצע שכל לקוח משלם בהזמנה. ככל שה-AOV גבוה יותר, אתה מרוויח יותר על אותה עלות פרסום בדיוק. הגדלת AOV היא אחד מהמנופים הכי רווחיים.'
        },
        {
          q: 'מה AutoDS עושה עבור חנות שופיפיי?',
          options: ['מעצבת את עמוד הבית', 'מנהלת מלאי ומבצעת מילוי הזמנות אוטומטי מאלי-אקספרס', 'מנהלת חשבוניות ומיסים', 'שולחת קמפיינים של ניוזלטר'],
          correct: 1,
          explain: 'AutoDS מושכת מוצרים מאלי-אקספרס ישירות לחנות שלך, ומבצעת הזמנה אוטומטית אצל הספק כשמגיעה מכירה. גם ב-1,000 הזמנות ביום, ללא מגע אנושי.'
        },
        {
          q: 'מה AutoTrack עושה עבור הלקוחות של החנות שלך?',
          options: ['עוקבת אחר הקלקות מפייסבוק ואינסטגרם', 'מספקת דף מעקב ממותג שמסתיר שהמשלוח יוצא מסין', 'מנהלת את הקמפיינים הממומנים', 'מייצרת חשבוניות PDF אוטומטית'],
          correct: 1,
          explain: 'AutoTrack נותנת לכל לקוח דף מעקב עם הלוגו של המותג שלך, ללא שום רמז שהחבילה יוצאת מסין. זה מפחית ביטולים ותלונות ומגדיל את האמון במותג.'
        },
      ],
      m4: [
        {
          q: 'מי מממן בפועל את רכישת הסחורה מהספק במודל הדרופשיפינג?',
          options: ['הספק שולח ומחכה לתשלום אחר-כך', 'בעל החנות שומר מלאי מראש בביתו', 'הלקוח, הכסף נכנס לפני שמוזמן דבר מהספק', 'הבנק מעמיד קו אשראי לעסק'],
          correct: 2,
          explain: 'זה המנגנון הגאוני של דרופשיפינג: הלקוח משלם לך קודם, ורק אז אתה מזמין מהספק. אפס מלאי מראש, אפס הון עצמי תקוע. הכסף של הלקוח מממן את העסק.'
        },
        {
          q: 'מה הקריטריון הכי קריטי לבחירת מוצר מנצח לפי שיטת דניאל?',
          options: ['המוצר עם הכי הרבה ביקורות חיוביות באלי-אקספרס', 'מוצר שפותר כאב אמיתי ומוחשי', 'המוצר הזול ביותר שאפשר למצוא', 'מוצר שכבר מופיע בפרסומות טלוויזיה'],
          correct: 1,
          explain: 'בני אדם קונים כדי להיפטר מכאב, לא כי המוצר זול. כשמוצר פותר בעיה אמיתית, הלקוח מרגיש שאין לו ברירה. זה מוצר שמוכר את עצמו בלי מאמץ שיווקי כבד.'
        },
        {
          q: 'מהו "אזור המתיקות" של תמחור מוצר אימפולסיבי לפי דניאל?',
          options: ['10-50₪', '50-100₪', '100-300₪', '500-1,000₪'],
          correct: 2,
          explain: '100-300₪ הוא אזור הזהב: מספיק יקר כדי שיהיה לך רווח ממשי, מספיק זול כדי שהלקוח לא ישב ויחשוב. מתחת ל-100 הרווח קטן. מעל 300 הלקוח מתחיל להסס.'
        },
      ],
      m5: [
        {
          q: 'מה מייצגת ה-A הראשונה בתבנית AIDA כשכותבים תיאור מוצר?',
          options: ['Action · קריאה לפעולה מיידית', 'Authority · סמכות המותג', 'Attention · תפיסת תשומת-לב', 'Affiliate · שיווק שותפים'],
          correct: 2,
          explain: 'הצעד הראשון בכל תיאור מוצר הוא לתפוס את תשומת-הלב של הלקוח. בלי Attention, שאר התוכן לא נקרא בכלל. תמיד מתחילים שם.'
        },

    /* Pick ~5 questions per module, shuffle */
    function getQuestionsForModule(moduleId) {
      const pool = QUESTION_BANK[moduleId] || [];
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, Math.min(5, shuffled.length));
    }

    /* Normalize a module icon to Lucide markup (curriculum may hold emoji or
       already-Lucide markup). Pass-through if it already contains an <i>. */
    const ICON_EMOJI_MAP = {
      '🎯':'target','🏪':'store','🛍️':'shopping-bag','🛒':'shopping-bag',
      '✍️':'pen-line','📝':'pen-line','⚖️':'scale','⚙️':'settings','🛠️':'settings',
      '📚':'book-open','📖':'book-open','🎓':'graduation-cap','💰':'banknote',
      '📈':'trending-up','📊':'trending-up','🚀':'rocket','💡':'lightbulb',
      '🤖':'sparkles','✨':'sparkles','📦':'package','💳':'credit-card','🏆':'trophy'
    };
    function modIcon(raw) {
      if (!raw) return '<i data-lucide="circle-dot"></i>';
      if (raw.indexOf('<i') !== -1) return raw;
      const name = ICON_EMOJI_MAP[raw.trim()] || 'circle-dot';
      return '<i data-lucide="' + name + '"></i>';
    }

    /* ============================================================
       STAGE GRID
    ============================================================ */
    function buildStageGrid() {
      const grid = document.getElementById('stages-grid');
      grid.innerHTML = window.CURRICULUM.modules.map((mod, idx) => {
        const qCount = (QUESTION_BANK[mod.id] || []).length;
        const best = parseInt(localStorage.getItem('game_best_' + mod.id) || '0', 10);
        const starsHtml = best > 0 ? '<div class="stage-score">' + starsForScore(best, qCount) + '</div>' : '';
        return `
          <div class="stage-card portal-card--hover" onclick="startStage('${mod.id}')">
            ${starsHtml}
            <div class="stage-icon">${modIcon(mod.icon)}</div>
            <div class="stage-num">שלב ${idx + 1}</div>
            <div class="stage-name">${mod.title}</div>
            <div class="stage-prog">
              <div class="progress-bar" style="margin-top:8px">
                <i style="width:${best > 0 ? Math.round(best / qCount * 100) : 0}%"></i>
              </div>
            </div>
          </div>`;
      }).join('');
      window.refreshIcons && window.refreshIcons();
    }

    function starsForScore(correct, total) {
      const pct = correct / total;
      const star = '<i data-lucide="star"></i>';
      if (pct >= 0.8) return star + star + star;
      if (pct >= 0.5) return star + star;
      return star;
    }

    function updateHeroStats() {
      document.getElementById('stat-xp').textContent = window.Progress.xp();
      document.getElementById('stat-streak').textContent = window.Progress.streak();
      const stagesCompleted = window.CURRICULUM.modules.filter(m => parseInt(localStorage.getItem('game_best_' + m.id) || '0', 10) > 0).length;
      document.getElementById('stat-done').textContent = stagesCompleted;
      const xp = window.Progress.xp();
      const level = Math.floor(xp / 200);
      const xpInLevel = xp % 200;
      document.getElementById('xp-pct-label').textContent = xpInLevel + ' / 200 XP';
      document.getElementById('xp-bar-fill').style.width = Math.round(xpInLevel / 200 * 100) + '%';
    }

    /* ============================================================
       QUIZ ENGINE
    ============================================================ */
    let currentStageId = null;
    let questions = [];
    let currentQ = 0;
    let correctCount = 0;
    let answered = false;
    let earnedXp = 0;

    function startStage(moduleId) {
      const mod = window.CURRICULUM.modules.find(m => m.id === moduleId);
      if (!mod) return;
      currentStageId = moduleId;
      questions = getQuestionsForModule(moduleId);
      if (questions.length === 0) { toast('שאלות לשלב זה מגיעות בקרוב'); return; }
      currentQ = 0;
      correctCount = 0;
      answered = false;
      earnedXp = 0;

      document.getElementById('quiz-stage-title').innerHTML = modIcon(mod.icon) + ' <span>' + mod.title + '</span>';
      window.refreshIcons && window.refreshIcons();
      document.getElementById('celebration').classList.remove('show');
      document.getElementById('question-area').style.display = '';

      const overlay = document.getElementById('quiz-overlay');
      overlay.classList.add('open');
      overlay.scrollTop = 0;

      renderQuestion();
    }

    function closeQuiz() {
      document.getElementById('quiz-overlay').classList.remove('open');
      updateHeroStats();
      buildStageGrid();
    }

    function renderQuestion() {
      const q = questions[currentQ];
      const total = questions.length;

      document.getElementById('q-counter').textContent = (currentQ + 1) + ' / ' + total;
      document.getElementById('quiz-progress-bar').style.width = Math.round(currentQ / total * 100) + '%';

      const area = document.getElementById('question-area');
      area.innerHTML = `
        <div class="question-card">
          <div class="question-text">${q.q}</div>
          <div class="options-list">
            ${q.options.map((opt, i) => `
              <button class="option-btn" onclick="selectAnswer(${i})">${opt}</button>
            `).join('')}
          </div>
          <div class="feedback-panel" id="feedback-panel"></div>
          <div class="next-btn-wrap" id="next-btn-wrap" style="display:none">
            <button class="btn btn--primary btn--block btn--lg" onclick="nextQuestion()">
              ${currentQ + 1 < questions.length ? 'שאלה הבאה ←' : 'לתוצאות שלי ←'}
            </button>
          </div>
        </div>`;
      answered = false;
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;

      const q = questions[currentQ];
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(b => b.disabled = true);

      const isCorrect = idx === q.correct;
      buttons[idx].classList.add(isCorrect ? 'correct' : 'wrong');
      if (!isCorrect) buttons[q.correct].classList.add('correct');

      if (isCorrect) {
        correctCount++;
        earnedXp += 10;
        window.Progress.addXp(10);
      }

      const fp = document.getElementById('feedback-panel');
      fp.className = 'feedback-panel show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
      fp.innerHTML = `
        <div class="feedback-icon"><i data-lucide="${isCorrect ? 'check-circle-2' : 'x-circle'}"></i></div>
        <div class="feedback-headline">${isCorrect ? 'נכון לגמרי!' : 'לא הפעם...'}</div>
        <div class="feedback-explain">${q.explain}</div>
        ${isCorrect ? '<div class="feedback-xp">+10 XP</div>' : ''}`;
      window.refreshIcons && window.refreshIcons();

      document.getElementById('next-btn-wrap').style.display = '';
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ >= questions.length) {
        showCelebration();
      } else {
        document.getElementById('quiz-overlay').scrollTop = 0;
        renderQuestion();
      }
    }

    function showCelebration() {
      document.getElementById('question-area').style.display = 'none';
      const total = questions.length;
      const pct = correctCount / total;

      // Save best score
      const prev = parseInt(localStorage.getItem('game_best_' + currentStageId) || '0', 10);
      if (correctCount > prev) localStorage.setItem('game_best_' + currentStageId, String(correctCount));

      let icon, title, subtitle;
      if (pct >= 0.8) {
        icon = 'trophy'; title = 'מנטליות של מיליון!'; subtitle = 'זה בדיוק הידע שיבדיל אותך מהשאר.';
      } else if (pct >= 0.6) {
        icon = 'flame'; title = 'חזק! אתה בדרך הנכונה.'; subtitle = 'עוד סיבוב אחד ואתה סוגר את זה לגמרי.';
      } else if (pct >= 0.4) {
        icon = 'book-open'; title = 'בסיס טוב, בואו נחדד!'; subtitle = 'חזור לשיעור ותנסה שוב · זה ישתלם.';
      } else {
        icon = 'rotate-ccw'; title = 'הפעם זה מאתגר.'; subtitle = 'כל טעות מלמדת אותך משהו שהמתחרים לא יודעים.';
      }

      const stars = starsForScore(correctCount, total);
      document.getElementById('cele-emoji').innerHTML = '<i data-lucide="' + icon + '"></i>';
      document.getElementById('cele-title').textContent = title;
      document.getElementById('cele-subtitle').textContent = subtitle;
      document.getElementById('cele-stars').innerHTML = stars;
      document.getElementById('cele-score').textContent = correctCount + '/' + total;
      document.getElementById('cele-xp').textContent = '+' + earnedXp + ' XP';
      window.refreshIcons && window.refreshIcons();

      const cel = document.getElementById('celebration');
      cel.classList.add('show');
      document.getElementById('quiz-overlay').scrollTop = 0;

      toast('+' + earnedXp + ' XP נוספו לחשבונך!');
    }

    /* ============================================================
       INIT
    ============================================================ */
    updateHeroStats();
    buildStageGrid();
  </script>
</body>
</html>
